<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Riwayat Pesanan - MatCen</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <a href="index.html" style="display: inline-block; margin: 20px; padding: 10px 20px; background: var(--primary-color); color: white; text-decoration: none; border-radius: 5px;">
        <i class="fas fa-arrow-left"></i> Kembali ke Katalog
    </a>

    <div style="margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px;">
        <h3 style="color: #002D5B;"><i class="fas fa-clipboard-list"></i> Daftar Pesanan Masuk</h3>
        <div id="daftarPesananSupplier" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div> 
    
    <section id="ikmDashboard" class="section" style="padding: 4rem 5%; background: var(--bg-light);">
        <h2 style="color: var(--primary-color); margin-bottom: 20px;"><i class="fas fa-shopping-bag"></i> Riwayat & Status Pesanan Saya</h2>
        <div id="daftarPesananIKM" style="display: flex; flex-direction: column; gap: 15px; max-width: 1000px; margin: 0 auto;"></div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, getDocs, query, where, updateDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDlsuZTlENpl1xT36w7mDBk6zWxO9ghbGI",
            authDomain: "matcen-industri.firebaseapp.com",
            projectId: "matcen-industri",
            storageBucket: "matcen-industri.firebasestorage.app",
            messagingSenderId: "46754979784",
            appId: "1:46754979784:web:dda78109bb3ca33a78eafd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 5. DETEKSI SIAPA YANG LOGIN (Ini krusial sebelum memanggil data)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Ambil role user dari Firestore
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    window.currentUserRole = data.tipe === 'supplier' ? 'supplier' : 
                                             data.tipe === 'industri' ? 'industri' : 'admin';
                    
                    // Tampilkan area yang sesuai
                    if(window.currentUserRole === 'supplier') {
                        document.getElementById('ikmDashboard').style.display = 'none';
                    } else {
                        document.getElementById('daftarPesananSupplier').parentElement.style.display = 'none';
                    }

                    // BARU SEKARANG KITA BISA PANGGIL FUNGSI MUAT PESANAN
                    window.muatDaftarPesanan();
                }
            } else {
                // Jika belum login, tendang balik ke index
                alert("Silakan login terlebih dahulu!");
                window.location.href = "index.html";
            }
        });

        // ==========================================
        // 6. PASTE SEMUA FUNGSI JAVASCRIPT KAMU DI SINI
        // ==========================================
        // window.muatDaftarPesanan = async () => { ... }
        // const warnaStatus = ...
        // const tombolAksiPesanan = ...
        // window.tolakPesanan = ...
        // ... (dan seterusnya sampai fungsi batalkanPesananTergantung)
        
    </script>
</body>
</html>
